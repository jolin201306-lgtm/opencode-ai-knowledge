name: Daily Knowledge Collection

on:
  schedule:
    # 每天 UTC 00:00（北京时间 8:00）
    - cron: '0 0 * * *'
  workflow_dispatch:
    description: '手动触发知识采集'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行采集流水线
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --verbose

      - name: 校验 JSON 格式
        run: |
          mkdir -p knowledge/status
          NEW_FILES=$(git status --porcelain knowledge/articles/ | grep "^??" | awk '{print $2}' || true)
          if [ -n "$NEW_FILES" ]; then
            echo "$NEW_FILES" | tr '\n' ' ' | xargs python hooks/validate_json.py > knowledge/status/validate_$(date +%Y%m%d).log 2>&1 || true
          else
            echo "没有新文章，跳过校验" > knowledge/status/validate_$(date +%Y%m%d).log
          fi

      - name: 检查文章质量
        run: |
          mkdir -p knowledge/status
          NEW_FILES=$(git status --porcelain knowledge/articles/ | grep "^??" | awk '{print $2}' || true)
          if [ -n "$NEW_FILES" ]; then
            echo "$NEW_FILES" | tr '\n' ' ' | xargs python hooks/check_quality.py > knowledge/status/quality_$(date +%Y%m%d).log 2>&1 || true
          else
            echo "没有新文章，跳过质量检查" > knowledge/status/quality_$(date +%Y%m%d).log
          fi

      - name: 配置 Git 用户
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 提交并推送新文章
        run: |
          # 检查是否有新文件
          NEW_FILES=$(git status --porcelain knowledge/articles/ | grep -c "^??" || true)
          
          if [ "$NEW_FILES" -gt 0 ]; then
            git add knowledge/articles/
            git commit -m "自动采集: 新增 ${NEW_FILES} 篇文章 ($(date '+%Y-%m-%d'))"
            git push
            echo "已提交 ${NEW_FILES} 篇新文章"
          else
            echo "没有新数据，跳过提交"
          fi
